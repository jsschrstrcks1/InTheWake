# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build deploy artifact (excludes dev-only paths)
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.claude/' \
            --exclude='admin/claude/' \
            --exclude='admin/UNFINISHED_TASKS.md' \
            --exclude='admin/IN_PROGRESS_TASKS.md' \
            --exclude='admin/COMPLETED_TASKS.md' \
            --exclude='admin/CAREFUL.md' \
            --exclude='admin/CAREFUL_AUDIT_2026_03_27.md' \
            --exclude='admin/README.md' \
            --exclude='admin/PORT_DISRUPTION_FACTORS_REFERENCE.md' \
            --exclude='data/' \
            --exclude='eslint.config.js' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='lychee.toml' \
            --exclude='node_modules/' \
            --exclude='_site/' \
            --exclude='*.tar.gz' \
            ./ _site/
          echo "--- Deploy artifact size ---"
          du -sh _site/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
