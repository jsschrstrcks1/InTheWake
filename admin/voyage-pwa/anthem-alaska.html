{d:1,date:"2026-06-29",loc:"Seattle, WA",type:"port",lat:47.60621,lon:-122.33207,pos:"Seattle, WA · 47.6°N, 122.3°W — embarkation at Pier 91; Anthem sails late afternoon.",dock:"Smith Cove Cruise Terminal (Pier 91) · 2001 W Garfield St, Seattle, WA 98119",wx:{hi:77,lo:57,txt:"Seattle's driest, sunniest month — mostly clear."},plan:["Board, drop bags, find your stateroom","Sailaway on deck — Puget Sound, the Olympics and the Cascades","First dinner aboard; wander Two70 and the SeaPlex"],hist:"The Great Seattle Fire of June 6, 1889 leveled about 100 acres of downtown; the rebuild raised the streets, leaving old storefronts buried as today's Seattle Underground. In 1897 the steamer Portland docked with 'a ton of gold,' and the city cast itself as the gateway to the Klondike — the same northbound run you're beginning.",poi:["Pike Place Market (founded 1907)","Seattle Underground tour, Pioneer Square","Klondike Gold Rush NHP — free NPS museum","Pioneer Square historic district","Space Needle & Seattle Center"]},
