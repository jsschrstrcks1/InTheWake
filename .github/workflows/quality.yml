# Quality checks workflow for In The Wake
# Runs link checking, validation, and placeholder detection
name: Quality Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Link checking with Lychee
  link-check:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Link Checker (Lychee)
        uses: lycheeverse/lychee-action@f81112d0d2814ded911bd23e3beaa9dda9093915  # v2.1.0
        with:
          # Use config file for exclusions (lychee.toml)
          args: >-
            --config ./lychee.toml
            --no-progress
            --base .
            './**/*.html'
          fail: false  # Don't fail workflow on broken links (report only)
          output: ./lychee-report.md
          lycheeVersion: v0.18.0  # Pin to stable version

      - name: Upload Link Check Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: lychee-report
          path: ./lychee-report.md
          retention-days: 30

  # Check for Unknown placeholders
  placeholder-check:
    name: Check Placeholders
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Check for Unknown placeholders
        run: |
          echo "🔍 Checking for 'Unknown' placeholders in HTML files..."

          # Patterns that indicate incomplete content
          PATTERNS=(
            "Unknown ship"
            "Unknown photographer"
            "Cruise Line: Unknown"
            "Photo by: Unknown"
            "Attribution: Unknown"
            ">Unknown<"
          )

          FOUND_ISSUES=0

          for pattern in "${PATTERNS[@]}"; do
            echo ""
            echo "Checking for: $pattern"
            if grep -r --include="*.html" "$pattern" . 2>/dev/null; then
              echo "⚠️  Found instances of: $pattern"
              FOUND_ISSUES=1
            else
              echo "✓ No instances found"
            fi
          done

          echo ""
          if [ $FOUND_ISSUES -eq 1 ]; then
            echo "⚠️  Warning: Found 'Unknown' placeholders that should be filled in"
            echo "These indicate incomplete content that needs attention."
            # Don't fail - just warn
          else
            echo "✓ No placeholder issues found"
          fi

  # Validate changed HTML files
  validate-html:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Check theological requirements
        run: |
          echo "🙏 Checking theological requirements in HTML files..."

          ERRORS=0

          # Check for Soli Deo Gloria
          echo ""
          echo "Checking for 'Soli Deo Gloria' invocation..."
          HTML_COUNT=$(find . -name "*.html" -type f | wc -l)
          SDG_COUNT=$(grep -r --include="*.html" -l "Soli Deo Gloria" . 2>/dev/null | wc -l)

          echo "Found $SDG_COUNT / $HTML_COUNT HTML files with Soli Deo Gloria"

          if [ "$SDG_COUNT" -lt "$HTML_COUNT" ]; then
            MISSING=$((HTML_COUNT - SDG_COUNT))
            echo "⚠️  $MISSING files missing Soli Deo Gloria invocation"
          fi

          # Check for ICP-Lite ai-summary
          echo ""
          echo "Checking for ICP-Lite ai-summary meta tags..."
          AI_SUMMARY_COUNT=$(grep -r --include="*.html" -l 'name="ai-summary"' . 2>/dev/null | wc -l)

          echo "Found $AI_SUMMARY_COUNT / $HTML_COUNT HTML files with ai-summary"

          echo ""
          echo "✓ Theological check complete"

      - name: Check HTML structure
        run: |
          echo "🏗️ Checking HTML structure..."

          ERRORS=0

          # Check for DOCTYPE
          echo "Checking DOCTYPE declarations..."
          find . -name "*.html" -type f | while read file; do
            if ! grep -qi "<!doctype html>" "$file"; then
              echo "⚠️  Missing DOCTYPE: $file"
            fi
          done

          # Check div balance (sample check on a few files)
          echo ""
          echo "Checking div tag balance (sampling)..."
          for file in $(find . -name "*.html" -type f | head -20); do
            OPEN=$(grep -o "<div" "$file" 2>/dev/null | wc -l || echo 0)
            CLOSE=$(grep -o "</div>" "$file" 2>/dev/null | wc -l || echo 0)
            if [ "$OPEN" -ne "$CLOSE" ]; then
              echo "⚠️  Unbalanced divs in $file: $OPEN open, $CLOSE close"
              ERRORS=1
            fi
          done

          if [ $ERRORS -eq 0 ]; then
            echo "✓ HTML structure checks passed"
          fi

  # Dead meta keywords guard (ICP-2 anti-pattern #4) — blocks regressions like #1851
  meta-keywords-guard:
    name: Meta Keywords Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Fail on dead meta keywords tags
        run: |
          echo "🔍 Checking for dead <meta name=\"keywords\"> tags (ICP-2 anti-pattern #4)..."
          # Matches both quote styles: name="keywords" and name='keywords'.
          # Does NOT match name="news_keywords" or data-keywords (different boundary).
          HITS=$(grep -rIl --include="*.html" -E 'name=["'\'']keywords["'\'']' . 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            echo "❌ Found dead meta keywords tags — remove them (ICP-2 anti-pattern #4):"
            echo "$HITS"
            echo ""
            echo "Background: removed sitewide; reintroduced once via merge-stale branch (#1851)."
            echo "This guard exists to catch that regression class at PR time."
            exit 1
          fi
          echo "✓ No dead meta keywords tags found"

  # V1.Beta badge guard — blocks the recurring article leak (#1612, #1828, #1869)
  v1beta-guard:
    name: V1.Beta Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Fail on V1.Beta in HTML
        run: |
          echo "🔍 Checking for V1.Beta in HTML (version badge / title / meta)..."
          # Site-wide *.html V1.Beta was driven to 0; any reappearance is a regression.
          # --include=*.html excludes the admin tools that legitimately contain the
          # string (validate-ship-page.js checks for it; fix-v1beta.cjs removes it).
          HITS=$(grep -rIl --include="*.html" 'V1\.Beta' . 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            echo "❌ Found V1.Beta in HTML — remove it (stale pre-release badge):"
            echo "$HITS"
            echo ""
            echo "Background: removed sitewide, but new hand-authored articles keep"
            echo "reintroducing the version-badge span (#1612, #1828, #1869) because the"
            echo "fix-v1beta.cjs cleanup only scans ships/. This guard catches it at PR time."
            exit 1
          fi
          echo "✓ No V1.Beta found in HTML"

  # Validator spec lint (anti-zombie check)
  validator-spec-lint:
    name: Validator Spec Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'

      - name: Run find-orphans.cjs
        run: node admin/validator-spec/scripts/find-orphans.cjs --check

      - name: Verify index is up to date
        run: node admin/validator-spec/scripts/generate-index.cjs --check

  # Summary job
  summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [link-check, placeholder-check, validate-html, meta-keywords-guard, v1beta-guard, validator-spec-lint]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Quality Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Link Check | ${{ needs.link-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Placeholder Check | ${{ needs.placeholder-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| HTML Validation | ${{ needs.validate-html.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Meta Keywords Guard | ${{ needs.meta-keywords-guard.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| V1.Beta Guard | ${{ needs.v1beta-guard.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validator Spec Lint | ${{ needs.validator-spec-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See individual job logs for details." >> $GITHUB_STEP_SUMMARY
