name = "jerusha-notes"
main = "worker.js"
compatibility_date = "2026-06-01"

kv_namespaces = [
  { binding = "NOTES", id = "PASTE_KV_NAMESPACE_ID_HERE" }
]

# Daily push windows (UTC). Lahore is UTC+5:
#   03:00 UTC = 8:00 AM Lahore (morning) · 16:00 UTC = 9:00 PM Lahore (evening)
[triggers]
crons = ["0 3 * * *", "0 16 * * *"]

# SECRETS (never in this file):
#   wrangler secret put NOTES_TOKEN     # bearer (already set)
#   wrangler secret put VAPID_PRIVATE   # Web Push signing key (Slice 2)
